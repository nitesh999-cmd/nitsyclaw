name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - name: PowerShell syntax
        shell: pwsh
        run: pnpm ci:powershell
      - name: WhatsApp reply shape budget
        shell: pwsh
        run: pnpm ci:whatsapp-replies
      - name: WhatsApp reply snapshot drift
        shell: pwsh
        run: pnpm ci:whatsapp-snapshots
      - name: WhatsApp release gate
        shell: pwsh
        run: ./scripts/whatsapp-release-gate.ps1
      - run: pnpm test:coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          NODE_ENV: test

  whatsapp-production-smoke:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: 14a48d9f-310a-446f-9350-77a28ebdc239
      RAILWAY_ENVIRONMENT: production
      RAILWAY_SERVICE: web
      NITSYCLAW_RAILWAY_PUBLIC_URL: https://web-production-c98e2.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check Railway CI token
        id: railway-token
        shell: bash
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::Skipping live Railway WhatsApp production smoke because RAILWAY_TOKEN is not configured."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - name: Run WhatsApp production smoke
        if: steps.railway-token.outputs.configured == 'true'
        shell: pwsh
        run: ./scripts/whatsapp-production-smoke.ps1

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Semgrep
        run: python -m pip install semgrep
      - name: Run Semgrep
        shell: pwsh
        run: ./scripts/semgrep-scan.ps1
      - run: pnpm audit --audit-level=moderate

  zap-baseline:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Start dashboard for ZAP
        shell: bash
        env:
          NODE_ENV: test
          NITSYCLAW_DEV_AUTH_BYPASS: "1"
        run: |
          corepack pnpm --filter @nitsyclaw/dashboard exec next dev --webpack -p 3101 > next-zap.log 2>&1 &
          echo $! > next-zap.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3101/login >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat next-zap.log
          exit 1
      - name: Run OWASP ZAP baseline
        shell: pwsh
        run: ./scripts/zap-baseline.ps1 -Target http://host.docker.internal:3101 -Report zap-report.html
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Parse tracked PowerShell scripts
        shell: pwsh
        run: |
          git ls-files '*.ps1' | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_, [ref]$tokens, [ref]$errors) > $null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
              exit 1
            }
          }

  vercel-build:
    runs-on: ubuntu-latest
    needs: [test, e2e, security, zap-baseline]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check Vercel CI secrets
        id: vercel-secrets
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::warning::Skipping Vercel packaging check because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured. Production deploy proof must come from Vercel deployment status plus release:live-smoke."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "configured=true" >> "$GITHUB_OUTPUT"
      - name: Verify Vercel packaging on Linux
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm exec vercel build --yes --token "$VERCEL_TOKEN"
