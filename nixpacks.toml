# Railway/Nixpacks config for NitsyClaw bot
# Use Puppeteer's bundled Chromium (downloaded during pnpm install).
# Keep system libs Chromium needs to actually run.
[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]
aptPkgs = ["ca-certificates", "fonts-liberation", "libnss3", "libxss1", "libgbm1", "libgtk-3-0", "libasound2t64", "libcups2", "libxkbcommon0", "libxshmfence1", "libdrm2"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["echo no build needed"]

[start]
cmd = "pnpm --filter @nitsyclaw/bot start"